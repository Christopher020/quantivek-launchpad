<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantivek | High-Converting Software for Startups & SMEs</title>
    <meta name="description" content="Quantivek builds custom web applications, mobile apps, and scalable SaaS products for startups and SMEs. Transform your vision and accelerate growth." />
    <meta name="author" content="Quantivek" />
    <meta name="keywords" content="software agency, web development, mobile apps, custom software, SaaS, startups, SMEs, Nigeria, Quantivek" />
    <link rel="canonical" href="https://www.quantivek.com/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Quantivek | High-Converting Software for Startups & SMEs" />
    <meta property="og:description" content="Custom web applications, mobile apps, and digital solutions that transform your vision into reality." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.quantivek.com/" />
    <meta property="og:site_name" content="Quantivek" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Quantivek" />
    <meta name="twitter:title" content="Quantivek | High-Converting Software for Startups & SMEs" />
    <meta name="twitter:description" content="Custom web applications, mobile apps, and digital solutions for growing businesses." />

    <!-- Organization JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Quantivek",
        "url": "https://www.quantivek.com",
        "description": "Quantivek builds high-converting software and operates scalable SaaS products for startups and SMEs.",
        "sameAs": [
          "https://twitter.com/quantivek",
          "https://linkedin.com/company/quantivek",
          "https://github.com/quantivek"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Quantivek",
        "url": "https://www.quantivek.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.quantivek.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
